<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1b5e8c" />
  <meta name="description" content="MyDay - a simple daily helper for medications, appointments, and brain games." />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="MyDay" />
  <title>MyDay</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="appbar">
    <button id="backBtn" class="appbar__back" aria-label="Go back" hidden>Back</button>
    <h1 id="appTitle" class="appbar__title">MyDay</h1>
    <button id="homeBtn" class="appbar__home" aria-label="Go to home" hidden>Home</button>
  </header>

  <main id="app" class="app" aria-live="polite"></main>

  <div id="banner" class="banner" role="status" aria-live="assertive" hidden></div>

  <script type="module" src="./app.js"></script>
</body>
</html>
