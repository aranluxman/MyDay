<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MyDay</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a1a1a">
</head>
<body>
    <div id="app">
        <!-- View container where pages will be rendered -->
        <main id="view-container"></main>
    </div>

    <!-- Templates -->
    <template id="tpl-home">
        <header class="top-bar">
            <h1>My Day</h1>
        </header>
        <section class="status-card" id="med-status">
            <h2>Medication Status</h2>
            <div class="status-numbers">
                <div class="stat"><span id="stat-taken" class="good">0</span> Taken</div>
                <div class="stat"><span id="stat-missed" class="bad">0</span> Missed</div>
            </div>
        </section>
        <nav class="main-menu">
            <button class="nav-btn primary" data-route="medications">My Medications</button>
            <button class="nav-btn" data-route="appointments">My Appointments</button>
            <button class="nav-btn" data-route="games">Brain Games</button>
        </nav>
    </template>

    <template id="tpl-medications">
        <header class="top-bar with-back">
            <button class="back-btn" data-route="home">← Back</button>
            <h1>Medications</h1>
        </header>
        <div class="list-container" id="med-list">
            <!-- Doses will be injected here -->
        </div>
    </template>

    <script src="app.js"></script>
</body>
</html>
